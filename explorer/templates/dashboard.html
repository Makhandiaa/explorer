<!DOCTYPE html>
<html>
<head>

<title>Kenya Explorer</title>

<!-- Leaflet CSS map engine used for this project -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
    height: 600px;
    width: 100%;
}
</style>

</head>

<body>

<h1>Kenya Explorer</h1>

<h2>Your Exploration Progress</h2>

<p>Total Counties: {{ total }}</p>
<p>Visited Counties: {{ visited }}</p>
<p>Explored: {{ percentage }}%</p>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([0.0236, 37.9062], 6);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);


fetch('/static/data/kenyan-counties.geojson')
.then(response => response.json())
.then(data => {

    L.geoJSON(data, {
        style: function() {
            return {
                color: "black",
                weight: 1,
                fillColor: "gray",
                fillOpacity: 0.5
            };
        }

    }).addTo(map);

});
</script>

</body>
</html>
